<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>กรอกที่อยู่จัดส่ง</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #fdf5e6; font-family: sans-serif; padding: 50px;">

    <div style="background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #5c3a21; margin-bottom: 20px;">
            <i class="fa-solid fa-truck"></i> ข้อมูลที่อยู่จัดส่ง
        </h2>

        <form action="/shipping" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;">
                <div style="grid-column: span 2;">
                    <label style="font-weight: bold; color: #5c3a21;">ชื่อ-นามสกุล ผู้รับ</label>
                    <input type="text" name="full_name" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>
                
                <div>
                    <label style="font-weight: bold; color: #5c3a21;">เบอร์โทรศัพท์</label>
                    <input type="text" name="phone" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>

                <div>
                    <label style="font-weight: bold; color: #5c3a21;">รหัสไปรษณีย์</label>
                    <input type="text" name="postal_code" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>

                <div style="grid-column: span 2;">
                    <label style="font-weight: bold; color: #5c3a21;">บ้านเลขที่, ถนน, ซอย/หมู่บ้าน</label>
                    <input type="text" name="address_detail" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>

                <div>
                    <label style="font-weight: bold; color: #5c3a21;">ตำบล / แขวง</label>
                    <input type="text" name="sub_district" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>

                <div>
                    <label style="font-weight: bold; color: #5c3a21;">อำเภอ / เขต</label>
                    <input type="text" name="district" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>

                <div style="grid-column: span 2;">
                    <label style="font-weight: bold; color: #5c3a21;">จังหวัด</label>
                    <input type="text" name="province" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px;">
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <a href="/cart" style="flex: 1; text-align: center; padding: 15px; background: #eee; border-radius: 10px; text-decoration: none; color: #333; font-weight: bold;">กลับตะกร้า</a>
                <button type="submit" style="flex: 2; padding: 15px; background: #4a2c1b; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold;">
                    ไปหน้าชำระเงิน <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
