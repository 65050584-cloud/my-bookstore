{% extends "admin_base.html" %}

{% block admin_content %}
<header class="admin-header">
    <div class="admin-title-box">
        <h2>แก้ไขข้อมูลหนังสือ</h2>
        <p>Edit Product Details</p>
    </div>
</header>

<div style="background-color: #f4efe6; padding: 40px; border-radius: 20px; max-width: 600px;">
    <form action="/admin/edit_book/{{ book.id }}" method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #5c3a21; margin-bottom: 8px;">ชื่อหนังสือ:</label>
            <input type="text" name="title" value="{{ book.title }}" required style="width: 100%; padding: 12px; border: 1px solid #dcd3c6; border-radius: 10px; font-family: inherit; background: white;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #5c3a21; margin-bottom: 8px;">ราคา (บาท):</label>
            <input type="number" name="price" value="{{ book.price }}" required style="width: 100%; padding: 12px; border: 1px solid #dcd3c6; border-radius: 10px; font-family: inherit; background: white;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; font-weight: bold; color: #5c3a21; margin-bottom: 8px;">จำนวนสต็อก (เล่ม):</label>
            <input type="number" name="stock_quantity" value="{{ book.stock_quantity if book.stock_quantity else 0 }}" required style="width: 100%; padding: 12px; border: 1px solid #dcd3c6; border-radius: 10px; font-family: inherit; background: white;">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="background-color: #e6b800; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; font-size: 16px;">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกการแก้ไข
            </button>
            <a href="/admin/dashboard" style="background-color: #888; color: white; text-align: center; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; flex: 1; font-size: 16px;">
                ยกเลิก
            </a>
        </div>
    </form>
</div>
{% endblock %}
